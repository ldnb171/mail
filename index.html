<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator.Email Redirect</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    width:520px;
}

h2{
    margin-top:0;
    text-align:center;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<div class="container">

<h2>Generator.Email</h2>

<div class="input-group">

<input
id="email"
type="text"
placeholder="Nhập email...">

<button onclick="pasteClipboard()">
Dán
</button>

<button onclick="openMailbox()">
Mở
</button>

</div>

</div>

<script>

// =====================================
// Tách email đầu tiên tìm thấy
// =====================================

function extractEmail(text){

    if(!text) return null;

    const match = text.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);

    return match ? match[0] : null;

}

// =====================================
// Kiểm tra email
// =====================================

function isEmail(text){

    return extractEmail(text)!==null;

}

// =====================================
// Tự đọc clipboard khi mở web
// =====================================

async function autoPasteOnLoad(){

    try{

        const text = await navigator.clipboard.readText();

        const email = extractEmail(text);

        if(email){

            document.getElementById("email").value = email;

        }

    }catch(err){

        // Không có quyền thì bỏ qua

    }

}

// =====================================
// Nút Dán
// =====================================

async function pasteClipboard(){

    try{

        const text = await navigator.clipboard.readText();

        const email = extractEmail(text);

        if(email){

            document.getElementById("email").value = email;

        }else{

            alert("Không tìm thấy email trong clipboard.");

        }

    }catch(err){

        alert("Không thể đọc clipboard.\nHãy cấp quyền cho trình duyệt.");

    }

}

// =====================================
// Mở Generator.Email
// =====================================

function openMailbox(){

    const value = document.getElementById("email").value.trim();

    const email = extractEmail(value);

    if(!email){

        alert("Email không hợp lệ.");

        return;

    }

    const url = "https://generator.email/" + encodeURIComponent(email);

    window.open(url,"_blank");

}

// =====================================
// Enter
// =====================================

document.getElementById("email").addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        openMailbox();

    }

});

// =====================================
// Khi mở web
// =====================================

window.addEventListener("load",autoPasteOnLoad);

</script>

</body>
</html>
