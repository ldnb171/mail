<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generator.Email Redirect</title>

<style>

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 12px rgba(0,0,0,.15);
    width:520px;
}

h2{
    margin-top:0;
    text-align:center;
}

.input-group{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:10px 18px;
    font-size:16px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

.toast{

    position:fixed;

    bottom:25px;

    left:50%;

    transform:translateX(-50%);

    background:#333;

    color:#fff;

    padding:12px 20px;

    border-radius:10px;

    font-size:15px;

    opacity:0;

    pointer-events:none;

    transition:.3s;

    z-index:9999;

}

.toast.show{

    opacity:1;

}

</style>
</head>

<body>

<div class="container">

<h2>Generator.Email</h2>

<div class="input-group">

<input
id="email"
type="text"
placeholder="Nhập email...">

<button onclick="pasteClipboard()">
Dán
</button>

<button onclick="openMailbox()">
Mở
</button>

</div>

</div>

<div id="toast" class="toast"></div>

<script>

//======================================
// Toast
//======================================

function showToast(text){

    const toast=document.getElementById("toast");

    toast.innerText=text;

    toast.classList.add("show");

    clearTimeout(toast.timer);

    toast.timer=setTimeout(()=>{

        toast.classList.remove("show");

    },3000);

}

//======================================
// Tách email
//======================================

function extractEmail(text){

    if(!text) return null;

    const match=text.match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);

    return match?match[0]:null;

}

//======================================
// Copy email
//======================================

async function copyEmail(email){

    try{

        await navigator.clipboard.writeText(email);

        showToast("Đã copy email " + email + " vào clipboard");

    }catch(err){

    }

}

//======================================
// Khi mở web
//======================================

async function autoPasteOnLoad(){

    try{

        const text=await navigator.clipboard.readText();

        const email=extractEmail(text);

        if(email){

            document.getElementById("email").value=email;

            await copyEmail(email);

        }

    }catch(err){

    }

}

//======================================
// Nút Dán
//======================================

async function pasteClipboard(){

    try{

        const text=await navigator.clipboard.readText();

        const email=extractEmail(text);

        if(email){

            document.getElementById("email").value=email;

            await copyEmail(email);

        }else{

            alert("Không tìm thấy email trong clipboard.");

        }

    }catch(err){

        alert("Không thể đọc clipboard.\nHãy cấp quyền cho trình duyệt.");

    }

}

//======================================
// Mở
//======================================

function openMailbox(){

    const value=document.getElementById("email").value.trim();

    const email=extractEmail(value);

    if(!email){

        alert("Email không hợp lệ.");

        return;

    }

    window.open(

        "https://generator.email/"+encodeURIComponent(email),

        "_blank"

    );

}

//======================================
// Enter
//======================================

document.getElementById("email").addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        openMailbox();

    }

});

//======================================

window.addEventListener("load",autoPasteOnLoad);

</script>

</body>
</html>
